<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Eureka</title>
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.7.1/dist/leaflet.css"
    />
    <script src="https://unpkg.com/leaflet@1.7.1/dist/leaflet.js"></script>
    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
    <link
      href="https://fonts.googleapis.com/css?family=Playfair+Display:700|Quicksand:400,700&display=swap"
      rel="stylesheet"
    />
    <!-- Bulma CSS Framework -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bulma@0.9.4/css/bulma.min.css"
    />
    <!-- Custom Styles (VIVELE Design System) -->
    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="css/bulma-overrides.css" />
    <link rel="stylesheet" href="css/entry-transition.css" />
    <link rel="stylesheet" href="css/story-guide.css" />
    <!-- Performance Optimizations (Mobile) -->
    <link rel="stylesheet" href="css/performance.css" />
  </head>
  <body>
    <div id="cinema-overlay" class="glass-curtain" data-state="entering">
      <div class="ambient-glow"></div>
      <h1 class="eureka-title">
        <span>E</span>
        <span>u</span>
        <span>r</span>
        <span>e</span>
        <span>k</span>
        <span>a</span>
      </h1>
    </div>

    <div id="game-controls">
      <!-- Guide Button -->
      <button id="guide-btn" class="glass-btn float-btn" aria-label="Open Story Guide">
        📖 The Story
      </button>
      
      <h1>Eureka</h1>

      <!-- Story Overlay -->
      <div id="story-overlay" class="hidden glass-panel">
        <div class="story-content">
          <h2 id="story-title">Title</h2>
          <p id="story-text">Text</p>
          <!-- Bulma Buttons Container -->
          <div class="story-nav buttons is-justify-content-center">
            <button id="story-prev-btn" class="button vivele-button">Previous</button>
            <button id="story-next-btn" class="button vivele-button">Next</button>
            <button id="story-close-btn" class="button vivele-button">Close</button>
          </div>
        </div>
      </div>

      <div id="join-controls">
        <div class="control-group field">
          <label class="label" for="game-id-input">Enter Game ID:</label>
          <div class="control">
            <input type="text" id="game-id-input" class="input vivele-input" placeholder="e.g., ABCD" />
          </div>
          <div class="control">
            <button id="join-game-btn" class="button vivele-button is-fullwidth">Join Game</button>
          </div>
        </div>
      </div>

      <div id="game-info" class="hidden">
        <h2>Game: <span id="game-id-display"></span></h2>
        <h3>Round: <span id="round-display"></span> / 6</h3>
        <!-- Bulma Grid for Player Cards -->
        <div id="player-info" class="columns is-mobile is-multiline">
          <div class="column is-half-mobile is-full-tablet">
            <div class="player-card" id="player1">
              <div id="player1-name">Player 1</div>
              <div id="player1-score">Score: 0</div>
            </div>
          </div>
          <div class="column is-half-mobile is-full-tablet">
            <div class="player-card" id="player2">
              <div id="player2-name">Player 2</div>
              <div id="player2-score">Score: 0</div>
            </div>
          </div>
        </div>
      </div>

      <div id="setter-controls" class="control-group field hidden">
        <label class="label" for="radius-slider"
          >Hint Radius: <span id="radius-value">1</span> km</label
        >
        <div class="control">
          <input type="range" id="radius-slider" class="slider vivele-slider" min="1" max="10" value="1" />
        </div>
        <div class="control">
          <input
            type="text"
            id="hint-input"
            class="input vivele-input"
            placeholder="Enter a hint for the guesser"
          />
        </div>
        <div class="control">
          <button id="set-location-btn" class="button vivele-button is-fullwidth" disabled>Set Location</button>
        </div>
      </div>

      <div id="prompt">Welcome! Join a game to start.</div>
    </div>

      <div id="map-container" class="container">
        <div id="map"></div>
        <!-- Bulma Content Sections -->
        <div class="content vivele-content">
          <div id="street-view" class="vivele-section"></div>
          <div id="address-info" class="vivele-section"></div>
          <div id="country-flag" class="vivele-section"></div>
          <div id="fun-fact" class="vivele-section"></div>
          <div id="quiz" class="vivele-section"></div>
        </div>
      </div>

    <!-- Modular JS -->
    <script src="js/MapFacade.js"></script>
    <script src="js/GameUI.js"></script>
    <script src="js/StoryManager.js"></script>
    <script src="js/main.js"></script>
  </body>
</html>
