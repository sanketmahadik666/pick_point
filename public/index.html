<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Eureka</title>
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.7.1/dist/leaflet.css"
    />
    <script src="https://unpkg.com/leaflet@1.7.1/dist/leaflet.js"></script>
    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
    <link
      href="https://fonts.googleapis.com/css?family=Playfair+Display:700|Quicksand:400,700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="css/entry-transition.css" />
    <link rel="stylesheet" href="css/story-guide.css" />
  </head>
  <body>
    <div id="cinema-overlay" class="glass-curtain" data-state="entering">
      <div class="ambient-glow"></div>
      <h1 class="eureka-title">
        <span>E</span>
        <span>u</span>
        <span>r</span>
        <span>e</span>
        <span>k</span>
        <span>a</span>
      </h1>
    </div>

    <div id="game-controls">
      <!-- Guide Button -->
      <button id="guide-btn" class="glass-btn float-btn" aria-label="Open Story Guide">
        📖 The Story
      </button>
      
      <h1>Eureka</h1>

      <!-- Story Overlay -->
      <div id="story-overlay" class="hidden glass-panel">
        <div class="story-content">
          <h2 id="story-title">Title</h2>
          <p id="story-text">Text</p>
          <div class="story-nav">
            <button id="story-prev-btn">Previous</button>
            <button id="story-next-btn">Next</button>
            <button id="story-close-btn">Close</button>
          </div>
        </div>
      </div>

      <div id="join-controls">
        <div class="control-group">
          <label for="game-id-input">Enter Game ID:</label>
          <input type="text" id="game-id-input" placeholder="e.g., ABCD" />
          <button id="join-game-btn">Join Game</button>
        </div>
      </div>

      <div id="game-info" class="hidden">
        <h2>Game: <span id="game-id-display"></span></h2>
        <h3>Round: <span id="round-display"></span> / 6</h3>
        <div id="player-info">
          <div class="player-card" id="player1">
            <div id="player1-name">Player 1</div>
            <div id="player1-score">Score: 0</div>
          </div>
          <div class="player-card" id="player2">
            <div id="player2-name">Player 2</div>
            <div id="player2-score">Score: 0</div>
          </div>
        </div>
      </div>

      <div id="setter-controls" class="control-group hidden">
        <label for="radius-slider"
          >Hint Radius: <span id="radius-value">1</span> km</label
        >
        <input type="range" id="radius-slider" min="1" max="10" value="1" />
        <input
          type="text"
          id="hint-input"
          placeholder="Enter a hint for the guesser"
          style="
            margin: 1rem 0;
            width: 100%;
            border-radius: 8px;
            border: 1px solid #ccc;
            padding: 10px;
          "
        />
        <button id="set-location-btn" disabled>Set Location</button>
      </div>

      <div id="prompt">Welcome! Join a game to start.</div>
    </div>

    <div id="map-container">
      <div id="map"></div>
      <div id="street-view"></div>
      <div id="address-info"></div>
      <div id="country-flag"></div>
      <div id="fun-fact"></div>
      <div id="quiz"></div>
    </div>

    <!-- Modular JS -->
    <script src="js/MapFacade.js"></script>
    <script src="js/GameUI.js"></script>
    <script src="js/StoryManager.js"></script>
    <script src="js/main.js"></script>
  </body>
</html>
